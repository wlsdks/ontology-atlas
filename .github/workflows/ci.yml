name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: tsc · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Vault validate (dogfood frontmatter integrity)
        run: pnpm vault:validate

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (audit-only spec — a11y / aria / overflow / mobile)
        run: |
          pnpm exec playwright test \
            tests/e2e/a11y-structure.spec.ts \
            tests/e2e/aria-audit.spec.ts \
            tests/e2e/ui-audit-v2.spec.ts \
            tests/e2e/overflow-sweep.spec.ts \
            tests/e2e/mobile-overflow-check.spec.ts \
            tests/e2e/mobile-keyboard-audit.spec.ts

      - name: Build (static export)
        run: pnpm build

      - name: Bundle audit (firebase chunk leak guard)
        run: pnpm bundle:check
        continue-on-error: true
