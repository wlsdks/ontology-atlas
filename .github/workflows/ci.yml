name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: tsc · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Vault validate (dogfood frontmatter integrity)
        run: pnpm vault:validate

      - name: Vault paths audit (capability/element 의 path 가 실 코드 일치)
        run: pnpm vault:audit

      # R11 #24 — audit-only e2e CI 게이트 시도했으나 CI 환경 navigation race
      # 빈도 높아 reverted (a11y-structure / aria-audit / overflow-sweep
      # mobile-390 등 회귀). audit spec 은 console dump 의도라 실질 가드 0
      # 이고 보수 부담이 가치를 초과. e2e CI 게이트는 #12 functional spec
      # 보수 완료 후 재평가. playwright.config.ts 의 webServer 는 로컬 e2e
      # 편의 위해 유지.

      - name: Build (static export)
        run: pnpm build

      - name: Bundle audit (firebase chunk leak guard)
        # R10 (2026-05) 부터 firebase deps 자체가 package.json 에서 제거되어
        # chunk 0 이 default 통과 조건. 더 이상 soft-warn 의미 없음 — chunk 가
        # 검출되면 *진짜 회귀* 라 PR block 이 정상.
        run: pnpm bundle:check
